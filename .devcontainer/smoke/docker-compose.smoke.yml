# Override for CI: stubs the firewall (iptables needs NET_ADMIN which
# is unreliable in GitHub Actions runners) so compose dependencies,
# network namespace sharing, and entrypoint hardening can be tested.
services:
  firewall:
    command:
      - bash
      - -c
      - |
        echo "Smoke: firewall stub (iptables skipped)"
        touch /tmp/firewall-ready
        exec sleep infinity
