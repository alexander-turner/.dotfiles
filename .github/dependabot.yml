version: 2

updates:
  # Devcontainer Dockerfile — track the mcr.microsoft.com base image SHA and
  # the pinned versions of gh / gitleaks / stylua (declared as ARG). Without
  # this, the digest pin in .devcontainer/Dockerfile silently goes stale.
  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly

  # GitHub Actions — devcontainers/ci, docker/login-action,
  # docker/setup-qemu-action, actions/checkout, etc.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
