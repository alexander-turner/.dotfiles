name: "Setup Base Environment"
description: "Sets up Node.js with pnpm and caching when the repo has a package.json. Optionally sets up Python with uv."
# Vendored from alexander-turner/claude-automation-template at dc94850 because
# template-sync.yaml's SYNC_PATHS doesn't cover .github/actions/. Local change
# vs upstream: every node/pnpm step is gated on hashFiles('package.json') so
# this composite is a no-op in non-Node repos (this dotfiles repo). When
# upstream lands an equivalent guard, re-vendor and drop the divergence.
inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22"
  setup-python:
    description: "Whether to set up Python with uv"
    required: false
    default: "false"
  python-version:
    description: "Python version to use (if setup-python is true)"
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      if: hashFiles('package.json') != ''
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      if: hashFiles('package.json') != ''
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - name: Get pnpm store directory
      if: hashFiles('package.json') != ''
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Restore pnpm cache
      if: hashFiles('package.json') != ''
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install Node Dependencies
      if: hashFiles('package.json') != ''
      run: pnpm install
      shell: bash

    - name: Set up uv
      if: inputs.setup-python == 'true'
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      if: inputs.setup-python == 'true'
      run: uv python install ${{ inputs.python-version }}
      shell: bash

    - name: Install Python Dependencies
      if: inputs.setup-python == 'true'
      run: uv sync --frozen
      shell: bash
