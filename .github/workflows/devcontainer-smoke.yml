name: Devcontainer smoke

on:
  push:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".mcp.json"
      - "bin/check-devcontainer.sh"
      - ".github/workflows/devcontainer-smoke.yml"
  pull_request:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".mcp.json"
      - "bin/check-devcontainer.sh"
      - ".github/workflows/devcontainer-smoke.yml"

jobs:
  smoke:
    name: Build .devcontainer image and verify installed tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses devcontainer.smoke.json (no postCreateCommand, no runArgs) so
      # the smoke test validates the IMAGE in isolation. The real
      # devcontainer.json wires up init-firewall.sh + setup.sh --link-only
      # for actual developer sessions — those are tested by usage, not here.
      - name: Build devcontainer and run smoke check
        uses: devcontainers/ci@v0.3
        with:
          imageName: dotfiles-devcontainer-smoke
          configFile: .devcontainer/devcontainer.smoke.json
          runCmd: bash .devcontainer/smoke-check.sh
