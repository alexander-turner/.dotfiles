name: Devcontainer smoke

on:
  push:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".claude/hooks/**"
      - "bin/check-devcontainer.bash"
      - "bin/check-compose-lifecycle.bash"
      - ".github/workflows/devcontainer-smoke.yml"
  pull_request:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".claude/hooks/**"
      - "bin/check-devcontainer.bash"
      - "bin/check-compose-lifecycle.bash"
      - ".github/workflows/devcontainer-smoke.yml"

# packages:write lets the action push to GHCR on main; read-only otherwise.
permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  smoke:
    name: Build .devcontainer image and verify installed tools (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            push: filter
          - arch: arm64
            runner: ubuntu-24.04-arm
            push: never
    steps:
      - uses: actions/checkout@v4

      # GHCR push only from amd64 leg — keeps a single-arch `:latest` tag,
      # matching prior behavior. The arm64 leg's job is to fail loudly if
      # the image or postCreateCommand breaks on aarch64.
      - name: Log in to GHCR
        if: matrix.push == 'filter' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # devcontainers/ci builds per devcontainer.json. We point at a minimal
      # smoke config (.devcontainer/smoke/devcontainer.json) that uses the
      # same Dockerfile but drops postStartCommand — the smoke test validates
      # the IMAGE, not the dev-experience hooks (firewall + setup.bash) that
      # layer on top. The real devcontainer.json runs init-firewall.bash; it's
      # tested by usage, not here, because (a) iptables/ipset in the action's
      # sandboxed runtime is unreliable, and (b) we don't want a firewall
      # failure during postStartCommand to mask an image regression.
      #
      # Each matrix leg runs natively on its own arch runner — no `platform`
      # flag, which would force buildx into OCI-tarball export and leave
      # `runCmd` with no loaded image to exec.
      - name: Build devcontainer, run smoke check, publish to GHCR
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/dotfiles-devcontainer
          imageTag: latest,${{ github.sha }}
          configFile: .devcontainer/smoke/devcontainer.json
          push: ${{ matrix.push }}
          runCmd: bash .devcontainer/smoke-check.bash 2>&1 | tee /workspace/smoke-check.log

      - name: Show smoke check output on failure
        if: failure()
        run: cat smoke-check.log 2>/dev/null || echo "No smoke-check.log found (build failed before runCmd)"

  # Full compose lifecycle: builds all three containers (firewall, app,
  # monitor), validates network namespace sharing, capability separation,
  # entrypoint hardening, root ownership, and monitor fail-closed behavior.
  # Uses a stub firewall (no iptables) since NET_ADMIN is unreliable in
  # GitHub Actions.
  compose-lifecycle:
    name: Test three-container compose lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run compose lifecycle checks
        run: bash bin/check-compose-lifecycle.bash 2>&1 | tee /tmp/compose-lifecycle.log

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('/tmp/compose-lifecycle.log', 'utf8'); } catch {}
            const lines = log.split('\n').slice(-100).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Compose lifecycle test failed\n\n<details><summary>Last 100 lines</summary>\n\n\`\`\`\n${lines}\n\`\`\`\n\n</details>`
            });
