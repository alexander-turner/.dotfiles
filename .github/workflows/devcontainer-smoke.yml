name: Devcontainer smoke

on:
  push:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".mcp.json"
      - "bin/check-devcontainer.sh"
      - ".github/workflows/devcontainer-smoke.yml"
  pull_request:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".mcp.json"
      - "bin/check-devcontainer.sh"
      - ".github/workflows/devcontainer-smoke.yml"

jobs:
  smoke:
    name: Build .devcontainer image and verify installed tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run smoke test
        run: bash bin/check-devcontainer.sh
        env:
          IMAGE_TAG: dotfiles-devcontainer-smoke:${{ github.sha }}
