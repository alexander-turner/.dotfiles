name: Devcontainer smoke

on:
  push:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".mcp.json"
      - "bin/check-devcontainer.sh"
      - ".github/workflows/devcontainer-smoke.yml"
  pull_request:
    branches: [main, master]
    paths:
      - ".devcontainer/**"
      - ".mcp.json"
      - "bin/check-devcontainer.sh"
      - ".github/workflows/devcontainer-smoke.yml"

jobs:
  smoke:
    name: Build .devcontainer image and verify installed tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build devcontainer and run smoke check
        uses: devcontainers/ci@v0.3
        with:
          imageName: dotfiles-devcontainer-smoke
          runCmd: bash .devcontainer/smoke-check.sh
