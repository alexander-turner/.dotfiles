name: Uninstall round-trip

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Enforces the CLAUDE.md "Uninstall upkeep" contract: every safe_link in
# setup.bash whose target lives in $HOME has a matching remove in uninstall.bash.
# Test logic lives in tests/test_uninstall_roundtrip.py — pytest gives clean
# assertions and ruff already lints it.
#
# Runs on Ubuntu and macOS so the `if $IS_MAC` arm of bin/lib/symlinks.sh
# (aerospace, iTerm2 plist, swiftbar) is exercised on the OS that
# emits those entries. The bespoke macOS launch-agent safe_links in setup.bash
# live past --link-only's exit point and are intentionally out of scope.

jobs:
  uninstall-roundtrip:
    name: setup → uninstall leaves no repo symlinks (${{ matrix.os }})
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
          # Pin uv's default Python so `uv tool install` builds the
          # pytest venv on 3.13 deterministically.
          python-version: "3.13"
      # `uv tool install` puts a `pytest` shim at ~/.local/bin/pytest
      # (which setup-uv adds to GITHUB_PATH), so we don't need a
      # system-level Python on PATH.
      - run: uv tool install pytest
      - run: pytest -v tests/test_uninstall_roundtrip.py
