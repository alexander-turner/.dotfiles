name: Uninstall round-trip

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Enforces the CLAUDE.md "Uninstall upkeep" contract: every safe_link in
# setup.sh whose target lives in $HOME has a matching remove in uninstall.sh
# (typically via bin/lib/symlinks.sh). The real logic lives in
# bin/test-uninstall-roundtrip.sh — kept as a script (not inline run:) so
# shellcheck + shfmt cover it via bin/lint.sh's bin/*.sh glob.
#
# Runs on Ubuntu and macOS so the `if $IS_MAC` arm of bin/lib/symlinks.sh
# (aerospace, iTerm2 plist, borders, swiftbar) is exercised on the OS that
# emits those entries. The bespoke macOS launch-agent safe_links in setup.sh
# (CCR, tailscale-exit-node) live past the --link-only exit point and are
# intentionally out of scope.

jobs:
  uninstall-roundtrip:
    name: setup → uninstall leaves no repo symlinks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Round-trip setup.sh --link-only and uninstall.sh --yes
        env:
          HOME: ${{ runner.temp }}/fakehome
        run: |
          mkdir -p "$HOME"
          bash bin/test-uninstall-roundtrip.sh
