name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Install fish
        # No pre-commit hook ships a fish syntax checker; install for the local
        # fish-syntax hook in .pre-commit-config.yaml.
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-3
          sudo apt-get update
          sudo apt-get install -y fish

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest (for safe_link local hook)
        run: pip install pytest

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Run pre-commit (auto-fix mode)
        # Pre-commit exits non-zero when hooks modify files. We want CI to
        # commit the fix and surface unfixed failures separately, so swallow
        # this exit and re-check below.
        run: pip install pre-commit && pre-commit run --all-files --show-diff-on-failure || true

      - name: Test Claude Code hooks
        run: bash bin/test-claude-hooks.bash

      - name: Commit fixes if any
        run: bash bin/commit-lint-fixes.bash

      - name: Verify lint passes after fixes
        # Catches non-auto-fixable issues (shellcheck errors, gitleaks hits,
        # fish syntax errors) that the previous step skipped via `|| true`.
        run: pre-commit run --all-files
