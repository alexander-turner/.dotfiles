name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Install fish
        # No pre-commit hook ships a fish syntax checker; install for the local
        # fish-syntax hook in .pre-commit-config.yaml.
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-3
          sudo apt-get update
          sudo apt-get install -y fish

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          # Pin uv's default Python to 3.13 (matches the
          # `default_language_version` in .pre-commit-config.yaml).
          # `uv tool install` below builds each tool's venv with it; if
          # pre-commit later needs a different Python for a hook venv,
          # uv auto-installs that version on demand.
          python-version: "3.13"

      - name: Install pytest + pre-commit
        # `uv tool install` builds an isolated venv per tool and drops a
        # shim into ~/.local/bin (already on GITHUB_PATH via setup-uv).
        # Avoids `uv pip install --system`, which needs a system Python
        # on PATH that setup-uv's `python-version` doesn't actually
        # provide.
        run: |
          uv tool install pytest
          uv tool install pre-commit

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Run pre-commit (auto-fix mode)
        # Swallow rc=1 (hook auto-fixed files; the next commit step lands
        # the diff). Propagate rc=3+ (FATAL: e.g. missing interpreter,
        # bad hook env) so the failure surfaces here with pre-commit's
        # traceback, not silently in the later verify step.
        run: |
          pre-commit run --all-files --show-diff-on-failure || rc=$?
          [ "${rc:-0}" -le 1 ] || exit "$rc"

      - name: Test Claude Code hooks
        run: bash bin/test-claude-hooks.bash

      - name: Commit fixes if any
        run: bash bin/commit-lint-fixes.bash

      - name: Verify lint passes after fixes
        # Catches non-auto-fixable issues (shellcheck errors, gitleaks hits,
        # fish syntax errors) that the previous step's auto-fix swallowed.
        run: pre-commit run --all-files
