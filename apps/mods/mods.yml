# mods config — see https://github.com/charmbracelet/mods
#
# Intended invocation: through the `mods` fish function in
# apps/fish/config.fish, which wraps `command mods` in `envchain ai -- ...`.
# That populates VENICE_INFERENCE_KEY from the macOS Keychain (Bitwarden
# is the cross-machine source of truth — see README).
#
# Routing policy: Venice only. Venice provides end-to-end encryption
# between client and inference, so prompts/outputs aren't inspectable by
# the provider. Redpill's TEE is a weaker guarantee — not used here.

default-model: qwen3-coder-480b-a35b-instruct-turbo
default-api: venice
ask-model: false
format: false
format-as: markdown
quiet: false
status-text: Generating
no-limit: false
word-wrap: 80
include-prompt: 0
include-prompt-args: false
max-input-chars: 392000
max-retries: 5
fanciness: 10
temp: 0.7
topp: 1.0
http-proxy: ""

apis:
  venice:
    base-url: https://api.venice.ai/api/v1
    api-key-env: VENICE_INFERENCE_KEY
    # Model ids match Venice's /v1/models. Re-check after major Venice
    # catalog rotations — claude-guard/bin/lib/venice-resolve.bash can confirm the
    # current `default_code` trait owner.
    models:
      qwen3-coder-480b-a35b-instruct-turbo:
        aliases: ["coder", "code", "qwen"]
        max-input-chars: 256000
        fallback: claude-sonnet-4-6
      claude-sonnet-4-6:
        aliases: ["sonnet", "fast", "default"]
        max-input-chars: 200000
      claude-opus-4-7:
        aliases: ["opus", "think"]
        max-input-chars: 200000
      deepseek-v4-pro:
        aliases: ["deepseek", "reason"]
        max-input-chars: 200000
      mistral-small-2603:
        aliases: ["mistral"]
        max-input-chars: 256000
